<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BentoDeck — Live Cell Iteration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #FAFAFA; color: #1A1A1A; overflow-x: hidden;
        }
        .font-mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9999;
        }
        .tracking-ultra-wide { letter-spacing: 0.2em; }
        .text-balance { text-wrap: balance; }

        .icon-tile {
            display: flex; align-items: center; justify-content: center;
            border-radius: 22.5%;
            box-shadow: 0 12px 32px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .icon-tile:hover { transform: translateY(-3px); }
        .icon-tile svg { width: 64%; height: 64%; }

        .tile-mono { background: transparent; color: #1A1A1A; box-shadow: none; }
        .tile-dark { background: linear-gradient(140deg, #0A0A0A 0%, #2A2A2A 100%); color: #FAFAFA; }
        .tile-amber { background: linear-gradient(140deg, #FF7A1A 0%, #C24A00 100%); color: #FFF8E7; }
        .tile-cream { background: linear-gradient(140deg, #F4EFE6 0%, #E5DCC8 100%); color: #1A1A1A; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Original (jagged pulse)
        const Jagged = () => (
            <svg viewBox="0 0 100 100" style={{width:'100%',height:'100%'}}>
                <rect x="18" y="18" width="40" height="32" rx="5" fill="currentColor"/>
                <rect x="62" y="18" width="20" height="32" rx="4" fill="currentColor"/>
                <rect x="18" y="54" width="64" height="28" rx="5" fill="none" stroke="currentColor" strokeWidth="3"/>
                <path d="M 26 70 L 34 70 L 38 62 L 44 78 L 50 64 L 56 72 L 74 72"
                      fill="none" stroke="currentColor" strokeWidth="2.5"
                      strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
        );

        const Smooth = () => (
            <svg viewBox="0 0 100 100" style={{width:'100%',height:'100%'}}>
                <rect x="18" y="18" width="40" height="32" rx="5" fill="currentColor"/>
                <rect x="62" y="18" width="20" height="32" rx="4" fill="currentColor"/>
                <rect x="18" y="54" width="64" height="28" rx="5" fill="none" stroke="currentColor" strokeWidth="3"/>
                <path d="M 24 70 Q 32 60, 40 70 T 56 70 T 74 66"
                      fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/>
            </svg>
        );

        const Bars = () => (
            <svg viewBox="0 0 100 100" style={{width:'100%',height:'100%'}}>
                <rect x="18" y="18" width="40" height="32" rx="5" fill="currentColor"/>
                <rect x="62" y="18" width="20" height="32" rx="4" fill="currentColor"/>
                <rect x="18" y="54" width="64" height="28" rx="5" fill="none" stroke="currentColor" strokeWidth="3"/>
                <g fill="currentColor">
                    <rect x="26" y="68" width="3.5" height="10" rx="1"/>
                    <rect x="33" y="64" width="3.5" height="14" rx="1"/>
                    <rect x="40" y="70" width="3.5" height="8" rx="1"/>
                    <rect x="47" y="60" width="3.5" height="18" rx="1"/>
                    <rect x="54" y="66" width="3.5" height="12" rx="1"/>
                    <rect x="61" y="62" width="3.5" height="16" rx="1"/>
                    <rect x="68" y="68" width="3.5" height="10" rx="1"/>
                </g>
            </svg>
        );

        const Dots = () => (
            <svg viewBox="0 0 100 100" style={{width:'100%',height:'100%'}}>
                <rect x="18" y="18" width="40" height="32" rx="5" fill="currentColor"/>
                <rect x="62" y="18" width="20" height="32" rx="4" fill="currentColor"/>
                <rect x="18" y="54" width="64" height="28" rx="5" fill="none" stroke="currentColor" strokeWidth="3"/>
                <g fill="currentColor">
                    <circle cx="30" cy="74" r="2.5"/>
                    <circle cx="42" cy="71" r="3"/>
                    <circle cx="54" cy="67" r="3.5"/>
                    <circle cx="66" cy="63" r="4"/>
                </g>
            </svg>
        );

        const variants = [
            { Component: Jagged, name: "Jagged", code: "v3", desc: "Original. Sharp peaks, ER-style heartbeat. Communicates 'something is happening' loudest." },
            { Component: Smooth, name: "Smooth Wave", code: "v3-smooth", desc: "Calmer sparkline. Reads as 'continuous data' rather than 'spike alert.' Ages well." },
            { Component: Bars, name: "Bars", code: "v3-bars", desc: "Discrete ticks instead of continuous line. Most 'dashboard-native' — bars are how widgets actually render." },
            { Component: Dots, name: "Ascending Dots", code: "v3-dots", desc: "Most minimal. Four dots stepping up — the bento metaphor recurses (cells of cells). Best small-size legibility." },
        ];

        const tiles = [
            { cls: "tile-mono", label: "Mono · raw mark" },
            { cls: "tile-dark", label: "Dark · default" },
            { cls: "tile-amber", label: "Amber · trading floor" },
            { cls: "tile-cream", label: "Cream · editorial" },
        ];

        const App = () => {
            return (
                <div className="min-h-screen flex flex-col items-center py-20 px-6">

                    {/* Header */}
                    <div className="text-center mb-20 max-w-3xl">
                        <h1 className="text-5xl md:text-6xl font-extralight tracking-wider mb-4">
                            The Live Cell
                        </h1>
                        <p className="font-mono text-xs opacity-40 uppercase tracking-ultra-wide mb-8">
                            Iteration · 4 pulse treatments × 4 surfaces
                        </p>
                        <div className="w-12 h-[1px] bg-[#1A1A1A] mx-auto opacity-30"></div>
                    </div>

                    {/* Matrix: rows = variants, cols = tile treatments */}
                    <div className="max-w-6xl w-full">
                        {variants.map((v, vi) => (
                            <div key={vi} className="mb-24">
                                <div className="flex items-baseline gap-4 mb-8">
                                    <span className="font-mono text-xs opacity-40">{v.code}</span>
                                    <h2 className="text-2xl font-light tracking-wider">{v.name}</h2>
                                </div>
                                <p className="text-sm opacity-60 leading-relaxed mb-10 max-w-xl font-light">
                                    {v.desc}
                                </p>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
                                    {tiles.map((t, ti) => (
                                        <div key={ti} className="flex flex-col items-center">
                                            <div className={`icon-tile ${t.cls} w-32 h-32 mb-4`}>
                                                <v.Component />
                                            </div>
                                            <p className="font-mono text-[10px] opacity-50 uppercase tracking-widest">
                                                {t.label}
                                            </p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Scale strip */}
                    <div className="max-w-5xl w-full mt-16 mb-16">
                        <p className="font-mono text-xs opacity-40 uppercase tracking-ultra-wide mb-10 text-center">
                            Home Screen reality check — 60×60 settings · 76×76 home
                        </p>
                        <div className="grid grid-cols-4 gap-12 justify-items-center">
                            {variants.map((v, i) => (
                                <div key={i} className="flex flex-col items-center gap-4">
                                    <div className="flex gap-3 items-end">
                                        <div className="icon-tile tile-dark" style={{width:'29px',height:'29px'}}><v.Component/></div>
                                        <div className="icon-tile tile-dark" style={{width:'60px',height:'60px'}}><v.Component/></div>
                                        <div className="icon-tile tile-dark" style={{width:'76px',height:'76px'}}><v.Component/></div>
                                    </div>
                                    <p className="font-mono text-[10px] opacity-50 uppercase tracking-widest">{v.name}</p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Footer */}
                    <div className="mt-12 max-w-2xl text-center">
                        <p className="font-mono text-xs opacity-40 uppercase tracking-ultra-wide leading-loose">
                            BentoDeck · iteration phase · 2026
                        </p>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
