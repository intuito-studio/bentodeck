name: BentoDeck

options:
  bundleIdPrefix: com.intuitostudio
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""         # filled in per-user; free personal team
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  BentoDeck:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Shared
      - path: Assets.xcassets
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: BentoDeck
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.intuitostudio.bentodeck.refresh
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: "BentoDeck connects to the BentoDeck backend running on your Mac."
        NSSupportsLiveActivities: true
    entitlements:
      path: BentoDeck.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.intuitostudio.bentodeck
    dependencies:
      - target: BentoDeckWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.intuitostudio.bentodeck
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SUPPORTS_MACCATALYST: NO

  BentoDeckWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widget
      - path: Sources/Shared
    info:
      path: Sources/Widget/Info.plist
      properties:
        CFBundleDisplayName: BentoDeck
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: BentoDeckWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.intuitostudio.bentodeck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.intuitostudio.bentodeck.widget
        TARGETED_DEVICE_FAMILY: "1,2"

  BentoDeckTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: BentoDeck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.intuitostudio.bentodeck.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BentoDeck.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BentoDeck"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  BentoDeck:
    build:
      targets:
        BentoDeck: all
        BentoDeckWidget: all
        BentoDeckTests: [test]
    test:
      targets:
        - BentoDeckTests
      gatherCoverageData: false
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
